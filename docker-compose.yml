services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src/data:/app/src/data         # CSV persiste fuera del contenedor
      - ./src/embeddings:/app/src/embeddings  # índice FAISS persiste en disco
    env_file:
      - .env
    environment:
      PYTHONPATH: src/
      CSV_PATH: src/data/steam_rpg_games.csv
      PARAMETERS_PATH: src/knowledge/parameters.json
    restart: unless-stopped