name: Tests

on:
  push:
    branches: [main, prueba]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          CSV_PATH: src/data/steam_rpg_games.csv
          TAGS_PATH: src/data/tags.csv
          CATEGORIES_PATH: src/data/categories.csv
          GENRES_PATH: src/data/genres.csv
          PARAMETERS_PATH: src/knowledge/parameters.json
          EMBED_MODEL: sentence-transformers/all-MiniLM-L6-v2
          PYTHONPATH: src/
        run: 
          pytest tests/ -v --tb=short